<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" width="200" height="400">
  <defs>
    <!-- Gradient for top face (orange/coral to pink) -->
    <linearGradient id="topGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff8e53;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd93d;stop-opacity:1" />
    </linearGradient>

    <!-- Gradient for left face (magenta/hot pink) -->
    <linearGradient id="leftGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e91e63;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9c27b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6a1b9a;stop-opacity:1" />
    </linearGradient>

    <!-- Gradient for right face (light blue/lavender) -->
    <linearGradient id="rightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b39ddb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9575cd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7e57c2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Isometric 3D column/pillar -->
  <!-- Top face (parallelogram) -->
  <polygon points="100,50 170,90 100,130 30,90" fill="url(#topGradient)" />

  <!-- Left face (tall parallelogram) -->
  <polygon points="30,90 100,130 100,370 30,330" fill="url(#leftGradient)" />

  <!-- Right face (tall parallelogram) -->
  <polygon points="100,130 170,90 170,330 100,370" fill="url(#rightGradient)" />
</svg>
