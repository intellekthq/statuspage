owner: intellekthq
repo: intellekt-statuspage

sites:
  - name: bustdown API
    url: https://bustdownapi.intellekt.fyi/health
    icon: https://raw.githubusercontent.com/intellekthq/intellekt-statuspage/master/assets/bustdown.png
    expectedStatusCodes: [200]
    method: GET
  - name: kmap API
    url: https://kmap.api.intellekt.fyi/health
    icon: https://raw.githubusercontent.com/intellekthq/intellekt-statuspage/master/assets/kmap.png
    expectedStatusCodes: [200]
    method: GET

status-website:
  cname: status.intellekt.fyi
  name: intellekt status
  logoUrl: https://raw.githubusercontent.com/intellekthq/intellekt-statuspage/master/assets/logo.svg
  introTitle: intellekt status
  introMessage: Real-time uptime for intellekt APIs. Probes run every 5 minutes from GitHub Actions.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/intellekthq/intellekt-statuspage
  # Light theming: favicon + brand accent (intellekt purple #7c3aed).
  # Upstream Upptime CSS uses utility classes; the rules below target
  # the documented anchor/badge surfaces. Tune after first deploy if needed.
  customHeaderHTML: |
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/intellekthq/intellekt-statuspage/master/assets/favicon.ico">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/intellekthq/intellekt-statuspage/master/assets/apple-touch-icon.png">
    <style>
      :root {
        --primary-color: #7c3aed;
        --link-color: #7c3aed;
        --link-hover-color: #6d28d9;
      }
      a { color: #7c3aed; }
      a:hover { color: #6d28d9; }
      .status-up, .text-green-500 { color: #16a34a; }
      .status-down { color: #dc2626; }
      .navbar a, header a { color: #7c3aed; }
    </style>

assignees:
  - mach-kernel

i18n:
  activeIncidents: Active incidents
  allSystemsOperational: All systems operational

notifications: []
