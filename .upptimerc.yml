owner: intellekthq
repo: statuspage

sites:
  - name: bustdown API
    url: https://bustdownapi.intellekt.fyi/api/health
    icon: https://raw.githubusercontent.com/intellekthq/statuspage/main/assets/bustdown.png
    expectedStatusCodes: [200]
    method: GET
  - name: kmap API
    url: https://kmap.api.intellekt.fyi/api/health
    icon: https://raw.githubusercontent.com/intellekthq/statuspage/main/assets/kmap.png
    expectedStatusCodes: [200]
    method: GET

status-website:
  cname: status.intellekt.fyi
  name: intellekt status
  logoUrl: https://raw.githubusercontent.com/intellekthq/statuspage/main/assets/logo.svg
  introTitle: Intellekt Status
  introMessage: Live pulse on every intellekt API. Pinged from neutral public infrastructure, every five minutes. If something here is red, your stack is seeing it too — and we're already on it.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/intellekthq/statuspage
  # Light theming: favicon + brand accent (intellekt purple #7c3aed).
  # Upstream Upptime CSS uses utility classes; the rules below target
  # the documented anchor/badge surfaces. Tune after first deploy if needed.
  customHeaderHTML: |
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/intellekthq/statuspage/main/assets/favicon.svg">
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/intellekthq/statuspage/main/assets/favicon.ico">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/intellekthq/statuspage/main/assets/apple-touch-icon.png">
    <style>
      :root {
        --primary-color: #7c3aed;
        --link-color: #7c3aed;
        --link-hover-color: #6d28d9;
      }
      /* Brand purple accent for links + nav */
      a, .navbar a, header a { color: #7c3aed !important; }
      a:hover, .navbar a:hover, header a:hover { color: #6d28d9 !important; }
      /* Replace stock Tailwind green with cooler emerald-500
         (#10b981) so the up/operational state pairs with violet
         instead of clashing */
      [class*="text-green-"], .status-up, .status-operational {
        color: #10b981 !important;
      }
      [class*="bg-green-"] {
        background-color: #10b981 !important;
      }
      [class*="bg-green-1"], [class*="bg-green-2"] {
        background-color: #d1fae5 !important;
      }
      [class*="border-green-"] {
        border-color: #10b981 !important;
      }
      [class*="text-emerald-"] { color: #10b981 !important; }
      /* Down stays red */
      .status-down, [class*="text-red-"] { color: #dc2626 !important; }
    </style>

assignees:
  - mach-kernel

i18n:
  activeIncidents: Active incidents
  allSystemsOperational: All systems operational

notifications: []
